name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Compiler Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plankc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-rust-env
      - run: just test-all

  tree-sitter-test:
    name: Tree-sitter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plank-tree-sitter
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        id: cache-tree-sitter
        with:
          path: ~/.cargo/bin/tree-sitter
          key: tree-sitter-cli-0.26.8
      - if: steps.cache-tree-sitter.outputs.cache-hit != 'true'
        run: cargo install tree-sitter-cli --version 0.26.8
      - run: tree-sitter generate
      - run: tree-sitter test
