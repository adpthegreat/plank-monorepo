name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - platform: darwin
            arch: amd64
            runner: macos-latest
            target: x86_64-apple-darwin
          - platform: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        working-directory: plankc
        run: cargo build --profile release-safe --package plank --target ${{ matrix.target }}
        env:
          PLANK_VERSION: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plank-${{ matrix.platform }}-${{ matrix.arch }}
          path: plankc/target/${{ matrix.target }}/release-safe/plank

  vscode-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        working-directory: plank-vscode
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          vsce package -o "plankevm-${TAG}.vsix"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: plank-vscode/plankevm-*.vsix

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.4.44"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: Build book
        run: |
          mdbook build plank-doc
          cp -r plank-doc/src plank-doc/book/src

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: plank-doc/book/

  release:
    name: Create Release
    needs: [build, vscode-extension, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package tarballs
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for dir in artifacts/plank-*/; do
            name=$(basename "$dir")
            asset_name="${name/plank/plank-${TAG}}.tar.gz"
            mkdir -p staging
            cp "$dir/plank" staging/
            if [ -d "artifacts/docs" ]; then
              cp -r artifacts/docs staging/book
            fi
            if [ -d "std" ]; then
              cp -r std staging/std
            fi
            tar -czf "$asset_name" -C staging .
            rm -rf staging
          done

      - name: Generate checksums
        run: |
          shasum -a 256 plank-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plank-*.tar.gz
            artifacts/vscode-extension/plankevm-*.vsix
            checksums.txt
          generate_release_notes: true
