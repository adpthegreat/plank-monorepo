name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - platform: darwin
            arch: amd64
            runner: macos-latest
            target: x86_64-apple-darwin
          - platform: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        working-directory: plankc
        run: cargo build --release --package plank --target ${{ matrix.target }}
        env:
          PLANK_VERSION: ${{ github.ref_name }}

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ASSET_NAME="plank-${TAG}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$ASSET_NAME" -C plankc/target/${{ matrix.target }}/release plank
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plank-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.ASSET_NAME }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          shasum -a 256 plank-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/plank-*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
